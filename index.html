<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Store</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="cabecalho">
        <h3>cadastre seu veículo para vender mais rápido</h3>
    </header>
    <div class="form-container">
    <div class="form-header">
            <p>formulário</p>
        </div>

    <div class="form-body">
            <h1>Venda fácil seu carro</h1>
            <p>Descreva as caracteristicas do seu carro e marque os opcionais que ele possui</p>
            <form onsubmit="salvarCarros(event)">

                <div>
                    <label for="title">Título de anúcio<span>*</span></label>
                    <input type="text" name="tittle" id="tittle" class="block" placeholder="Um título para anúnciar o seu carro">
                </div>

                <div class="caixaInputs">
                    <label for="preco">Preço<span class="campo-obrigatório">*</span></label>
                    <input type="number" name="Preco" id="preco" class="block"  placeholder="Defina o preço">
                </div>

                <div>
                    <label for="descricao">Descrição </label>
                    <textarea name="descricao" id="descricao" class="block"  placeholder="Faça a descrição de seu veículo"></textarea>
                </div>

                <div>
                    <label for="marca">Marca<span class="campo-obrigatório">*</span></label>
                    <input type="text" name="marca" id="marca" class="block" placeholder="Marca do veículo">
                </div>

                <div>
                    <label for="modelo">Título de anúcio<span class="campo-obrigatório">*</span></label>
                    <input type="text" name="modelo" id="modelo" class="block" placeholder="Modelo do veículo">
                </div>

                <div>
                    <label for="quilometragem">Quilometragem<span class="campo-obrigatório">*</span></label>
                    <input type="number" name="quilometragem" id="preco" class="block" >
                </div>

                <div>
                    <label for="data de compra">Data de compra<span class="campo-obrigatório">*</span></label>
                    <input type="data" name="data de compra" id="class="block" data de compra">
                </div>

                <div>
                    <p>Tipo de câmbio: <span class="campo-obrigatório">*</span> </p>
                    <input type="rádio" name="marcha" id="manual">
                    <label for="manual">manual</label>
                    <input type="radio" name="marcha" id="auto">
                    <label for="auto">Automático</label>
                </div>

                <div class="CaixaOpcional">
                    <p>Opicionais</p>
                    <ul>
                        <li>
                            <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                            <label for="airbag">Airbag</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="arcondicionado" value="arcondicionado">
                            <label for="arcondicionado">Ar condicionado</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="cameradere" value="cameradere">
                            <label for="cameradere">Câmera de Ré</label>
                        </li>
                        </li>
                    </ul>
                </div>
                <div>
                <ul>
                    <li>
                        <input type="checkbox" name="opcional[]" id="assistenciadepista" value="assistenciadepista">
                        <label for="assistenciadepista">Assistência de pista</label>
                    </li>

                    <li>
                        <input type="checkbox" name="opcional[]" id="partidasemchave" value="partidasemchave">
                        <label for="partidasemchave">Partida sem Chave</label>
                    </li>

                    <li>
                        <input type="checkbox" name="opcional[]" id="integracaocomcelular" value="integracaocomcelular">
                        <label for="integracaocomcelular">Integração com Celular</label>
                    </li>

                    <li>
                        <input type="checkbox" name="opcional[]" id="bancodecouro" value="bancodecouro">
                        <label for="bancodecouro">Banco de Couro</label>
                    </li>

                    </li>
            </form>
        </div>
    <div>
    <p>Fotos do carro <span>*</span></p>
       <input type="file" name="imagem" id="imagem" multiple accept="image/png, image/jpg">
    </div>
<input type="submit" value="Enviar">
</form>
<hr>
<h2>Carros Cadastrados</h2>
<div>
    <script src="script/script.js"></script>
</div>
</body>
</html>
